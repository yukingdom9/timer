<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>音声診断ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #eee;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    color: #7c83fd;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .card {
    background: #16213e;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7c83fd;
    margin-bottom: 12px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .row:last-child { border-bottom: none; }
  .label { color: #aaa; }
  .val { font-weight: 600; font-size: 13px; }
  .ok   { color: #6bffb8; }
  .ng   { color: #ff6b6b; }
  .warn { color: #ffd93d; }
  .na   { color: #666; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #7c83fd;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { opacity: 0.75; }
  button.secondary {
    background: #0f3460;
    color: #aaa;
    font-size: 13px;
    padding: 10px;
  }
  #log {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px;
    max-height: 240px;
    overflow-y: auto;
  }
  .log-entry {
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    line-height: 1.5;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-time { color: #555; }
  .log-ok   { color: #6bffb8; }
  .log-ng   { color: #ff6b6b; }
  .log-warn { color: #ffd93d; }
  .log-info { color: #aaa; }
  a {
    display: block;
    text-align: center;
    padding: 12px;
    color: #7c83fd;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1>🔊 音声診断ツール</h1>

<!-- 環境情報 -->
<div class="card">
  <div class="card-title">環境情報</div>
  <div class="row"><span class="label">AudioContext 対応</span><span class="val" id="ac-support">—</span></div>
  <div class="row"><span class="label">AudioContext.state</span><span class="val" id="ac-state">—</span></div>
  <div class="row"><span class="label">sampleRate</span><span class="val" id="ac-sr">—</span></div>
  <div class="row"><span class="label">PWA Standalone</span><span class="val" id="standalone">—</span></div>
  <div class="row"><span class="label">visibility</span><span class="val" id="vis-state">—</span></div>
  <div class="row"><span class="label">iOS</span><span class="val" id="is-ios">—</span></div>
  <div class="row"><span class="label">Safari</span><span class="val" id="is-safari">—</span></div>
  <div class="row"><span class="label">iOS バージョン</span><span class="val" id="ios-ver">—</span></div>
  <div class="row"><span class="label">SW 対応</span><span class="val" id="sw-support">—</span></div>
  <div class="row"><span class="label">SW キャッシュ</span><span class="val" id="sw-cache">—</span></div>
</div>

<!-- テスト操作 -->
<div class="card">
  <div class="card-title">テスト操作（この順番で実行）</div>
  <button onclick="doUnlock()">① アンロック（ここをタップ）</button>
  <button onclick="doBeep()">② ビープ音テスト</button>
  <button onclick="doBeepDelayed()">③ 1秒後ビープ（ジェスチャー外テスト）</button>
  <button class="secondary" onclick="updateInfo()">情報を更新</button>
  <button class="secondary" onclick="doCheckSW()">SW キャッシュを確認</button>
  <button class="secondary" onclick="doClearSW()">SW キャッシュを削除してリロード</button>
</div>

<!-- ログ -->
<div class="card">
  <div class="card-title">ログ</div>
  <div id="log"><div class="log-entry log-info">— 操作するとログが表示されます —</div></div>
</div>

<a href="./index.html">← タイマーに戻る</a>

<script>
  var AC  = window.AudioContext || window.webkitAudioContext;
  var ctx = null;

  // ------------------------------------------------------------------
  function log(msg, type) {
    var el   = document.getElementById('log');
    var div  = document.createElement('div');
    var now  = new Date();
    var time = now.getHours() + ':' +
               String(now.getMinutes()).padStart(2,'0') + ':' +
               String(now.getSeconds()).padStart(2,'0') + '.' +
               String(now.getMilliseconds()).padStart(3,'0');

    div.className = 'log-entry log-' + (type || 'info');
    div.innerHTML = '<span class="log-time">[' + time + ']</span> ' + msg;
    // 最新ログを先頭に
    if (el.firstChild && el.firstChild.className === 'log-entry log-info' &&
        el.firstChild.textContent.indexOf('操作するとログが表示されます') >= 0) {
      el.removeChild(el.firstChild);
    }
    el.insertBefore(div, el.firstChild);
  }

  // ------------------------------------------------------------------
  function updateInfo() {
    var ua       = navigator.userAgent;
    var isIOS    = /iP(ad|hone|od)/.test(ua);
    var isSafari = /Safari/.test(ua) && !/Chrome/.test(ua) && !/CriOS/.test(ua);
    var iosMatch = ua.match(/OS (\d+)[_.](\d+)/);
    var iosVer   = iosMatch ? iosMatch[1] + '.' + iosMatch[2] : '—';
    var pwa      = window.navigator.standalone === true ||
                   window.matchMedia('(display-mode: standalone)').matches;

    set('ac-support', AC ? '✅ 対応' : '❌ 非対応', AC ? 'ok' : 'ng');
    set('ac-state',
        ctx ? ctx.state : '未作成',
        ctx && ctx.state === 'running' ? 'ok' : (ctx ? 'warn' : 'na'));
    set('ac-sr',   ctx ? ctx.sampleRate + ' Hz' : '—', 'na');
    set('standalone', pwa ? '✅ PWA起動' : '⚠ Safari直開き', pwa ? 'ok' : 'warn');
    set('vis-state', document.visibilityState,
        document.visibilityState === 'visible' ? 'ok' : 'warn');
    set('is-ios',    isIOS    ? '✅ iOS'    : '—', isIOS    ? 'ok' : 'na');
    set('is-safari', isSafari ? '✅ Safari' : '—', isSafari ? 'ok' : 'na');
    set('ios-ver', iosVer, iosVer !== '—' ? 'ok' : 'na');
    set('sw-support', 'serviceWorker' in navigator ? '✅' : '❌',
        'serviceWorker' in navigator ? 'ok' : 'ng');
  }

  function set(id, text, cls) {
    var el = document.getElementById(id);
    el.textContent  = text;
    el.className    = 'val ' + (cls || '');
  }

  // ------------------------------------------------------------------
  // ① アンロック
  // ------------------------------------------------------------------
  function doUnlock() {
    if (!AC) { log('AudioContext 非対応', 'ng'); return; }

    if (!ctx) {
      ctx = new AC();
      log('AudioContext 生成 state=' + ctx.state, 'info');
    }

    if (ctx.state === 'running') {
      log('既に running — 完全アンロック済み', 'ok');
      playSilent();
      updateInfo();
      return;
    }

    if (ctx.state === 'suspended') {
      log('resume() 呼び出し... state=' + ctx.state, 'warn');
      ctx.resume().then(function () {
        log('resume() 完了 state=' + ctx.state, 'ok');
        playSilent();
        updateInfo();
      }).catch(function (e) {
        log('resume() 失敗: ' + e, 'ng');
        updateInfo();
      });
    } else {
      log('state=' + ctx.state + ' (closed?)', 'ng');
    }
    updateInfo();
  }

  function playSilent() {
    if (!ctx || ctx.state !== 'running') return;
    var buf = ctx.createBuffer(1, 1, ctx.sampleRate);
    var src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    log('無音バッファ再生 → 完全アンロック完了', 'ok');
  }

  // ------------------------------------------------------------------
  // ② ビープ音テスト（即時）
  // ------------------------------------------------------------------
  function doBeep() {
    if (!ctx) { log('先に①アンロックを実行してください', 'ng'); return; }
    if (ctx.state !== 'running') {
      log('state=' + ctx.state + ' → 音が出せません。①を再度タップ', 'ng');
      updateInfo();
      return;
    }
    beep(ctx);
    log('ビープ音再生 → 聞こえましたか？', 'ok');
  }

  // ------------------------------------------------------------------
  // ③ 1秒後ビープ（ジェスチャー外シミュレーション）
  // ------------------------------------------------------------------
  function doBeepDelayed() {
    log('1秒後に再生します（ジェスチャー外テスト）...', 'warn');
    setTimeout(function () {
      if (!ctx) { log('[1秒後] AudioContext なし', 'ng'); return; }
      log('[1秒後] state=' + ctx.state, ctx.state === 'running' ? 'ok' : 'warn');
      if (ctx.state === 'running') {
        beep(ctx);
        log('[1秒後] 音が出たら成功！ジェスチャー外でも動作している', 'ok');
      } else {
        log('[1秒後] state=' + ctx.state + ' → 音が出ない（iOS の制限）', 'ng');
        log('  → タイマー終了時と同じ状況。pendingAlarm フラグで対応が必要', 'warn');
      }
      updateInfo();
    }, 1000);
  }

  function beep(c) {
    var beeps = [
      { freq: 880,  start: 0,    dur: 0.12 },
      { freq: 880,  start: 0.18, dur: 0.12 },
      { freq: 1320, start: 0.36, dur: 0.60 }
    ];
    beeps.forEach(function (b) {
      var osc  = c.createOscillator();
      var gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = 'sine'; osc.frequency.value = b.freq;
      var t = c.currentTime + b.start;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.45, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + b.dur);
      osc.start(t); osc.stop(t + b.dur + 0.05);
    });
  }

  // ------------------------------------------------------------------
  // SW キャッシュ確認
  // ------------------------------------------------------------------
  function doCheckSW() {
    if (!('caches' in window)) { log('Cache API 非対応', 'ng'); return; }
    caches.keys().then(function (keys) {
      if (keys.length === 0) {
        log('SW キャッシュなし', 'warn');
        set('sw-cache', 'なし', 'warn');
      } else {
        log('SW キャッシュ: ' + keys.join(', '), 'ok');
        set('sw-cache', keys.join(', '), keys.indexOf('timer-pwa-v2') >= 0 ? 'ok' : 'warn');
      }
    });
  }

  // ------------------------------------------------------------------
  // SW キャッシュ削除 → リロード
  // ------------------------------------------------------------------
  function doClearSW() {
    if (!('caches' in window)) { log('Cache API 非対応', 'ng'); return; }
    log('キャッシュを削除してリロードします...', 'warn');
    caches.keys().then(function (keys) {
      return Promise.all(keys.map(function (k) { return caches.delete(k); }));
    }).then(function () {
      log('削除完了。リロードします', 'ok');
      setTimeout(function () { location.reload(true); }, 500);
    });
  }

  // ------------------------------------------------------------------
  // イベント監視
  // ------------------------------------------------------------------
  document.addEventListener('visibilitychange', function () {
    var state = document.visibilityState;
    log('visibilitychange → ' + state + (ctx ? ' (AC:' + ctx.state + ')' : ''), 'warn');
    updateInfo();
    // 画面復帰時に AudioContext を resume する
    if (state === 'visible' && ctx && ctx.state === 'suspended') {
      ctx.resume().then(function () {
        log('復帰時 resume() 完了 state=' + ctx.state, 'ok');
        updateInfo();
      }).catch(function (e) {
        log('復帰時 resume() 失敗: ' + e, 'ng');
      });
    }
  });

  // 初期化
  updateInfo();
  doCheckSW();
</script>
</body>
</html>
