<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Timer">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.svg">
<title>タイマー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100%;
    background: #1a1a2e;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    /* ダブルタップズーム・テキスト選択を無効化 */
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    /* iOS Safariのフォントサイズ自動調整を無効化 */
    -webkit-text-size-adjust: 100%;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    padding: constant(safe-area-inset-top) constant(safe-area-inset-right) constant(safe-area-inset-bottom) constant(safe-area-inset-left);
    background-color: #1a1a2e;
    /* プルダウン更新・バウンススクロールを無効化 */
    overscroll-behavior: none;
  }

  /* ボタン類のダブルタップズームを個別に封じる */
  button {
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    text-align: center;
    padding: 40px 32px;
    background: #16213e;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    width: 340px;
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #7c83fd;
    margin-bottom: 36px;
  }

  .display {
    font-size: 88px;
    font-weight: 200;
    letter-spacing: -2px;
    line-height: 1;
    color: #fff;
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }

  .display.urgent { color: #ff6b6b; }
  .display.done   { color: #6bffb8; }

  /* 音声保留中の視覚フィードバック（pendingAlarm） */
  @keyframes alarm-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }
  .display.pending-alarm {
    animation: alarm-pulse 0.5s ease-in-out infinite;
  }

  .progress-ring {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 32px;
  }

  .progress-ring svg {
    transform: rotate(-90deg);
    position: absolute;
    top: 0; left: 0;
  }

  .progress-ring .display {
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
  }

  circle.track {
    fill: none;
    stroke: #0f3460;
    stroke-width: 6;
  }

  circle.progress {
    fill: none;
    stroke: #7c83fd;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  circle.progress.urgent { stroke: #ff6b6b; }
  circle.progress.done   { stroke: #6bffb8; }

  .presets {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .preset-btn {
    background: #0f3460;
    border: 2px solid transparent;
    color: #aaa;
    border-radius: 12px;
    padding: 8px 0;
    width: 64px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover { background: #1a4a8a; color: #fff; }

  .preset-btn.active {
    border-color: #7c83fd;
    color: #7c83fd;
    background: #1a1a3e;
  }

  .adjusters {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .adj-btn {
    background: #0f3460;
    border: none;
    color: #aaa;
    border-radius: 10px;
    padding: 7px 0;
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .adj-btn:hover { background: #1a4a8a; color: #fff; }
  .adj-btn:active { transform: scale(0.95); }

  .start-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: #7c83fd;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .start-btn:hover  { background: #9da2ff; transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }
  .start-btn.running { background: #444; }
  .start-btn.running:hover { background: #555; }
</style>
</head>
<body>
<div class="container">
  <h1>Timer</h1>

  <div class="progress-ring">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle class="track"    cx="100" cy="100" r="88"/>
      <circle class="progress" cx="100" cy="100" r="88" id="ring"/>
    </svg>
    <div class="display" id="display">3:00</div>
  </div>

  <div class="presets">
    <button class="preset-btn" onclick="setPreset(1,event)">1分</button>
    <button class="preset-btn active" onclick="setPreset(3,event)">3分</button>
    <button class="preset-btn" onclick="setPreset(5,event)">5分</button>
    <button class="preset-btn" onclick="setPreset(10,event)">10分</button>
  </div>

  <div class="adjusters">
    <button class="adj-btn" onclick="adjust(-60)">−1分</button>
    <button class="adj-btn" onclick="adjust(-30)">−30秒</button>
    <button class="adj-btn" onclick="adjust(30)">+30秒</button>
    <button class="adj-btn" onclick="adjust(60)">+1分</button>
  </div>

  <button class="start-btn" id="startBtn" onclick="toggle()">スタート</button>
</div>

<script>
  var CIRCUMFERENCE = 2 * Math.PI * 88;
  var ring     = document.getElementById('ring');
  var display  = document.getElementById('display');
  var startBtn = document.getElementById('startBtn');
  ring.style.strokeDasharray = CIRCUMFERENCE;

  var totalSeconds = 180;
  var remaining    = 180;
  var running      = false;
  var worker       = null;

  // =====================================================================
  // iOS Safari / PWA 音声アンロック — 完全版
  // =====================================================================
  //
  // ■ なぜ iPhone で動かないのか（5層の制限）
  //   Layer 1: AudioContext 生成直後は state === 'suspended' で止まる
  //   Layer 2: resume() はユーザージェスチャーの【同期スタック内】でしか効かない
  //            → async/await を挟むと iOS では gesture trust が失われることがある
  //            → 前実装の async function start() + await が問題だった
  //   Layer 3: 無音バッファを一度再生しないと古い iOS では完全にアンロックされない
  //   Layer 4: PWA バックグラウンド時に AudioContext が自動で suspended に戻る
  //   Layer 5: タイマー終了時に AudioContext が suspended だと音が出ない
  //
  // ■ なぜ PWA で特に失敗するのか
  //   Safari ブラウザタブより PWA standalone モードの方が制限が厳しい。
  //   スリープ復帰後の AudioContext は suspended になるが、
  //   その状態で resume() を呼んでも gesture trust がないと失敗する。
  //
  // ■ ハードウェアサイレントスイッチ
  //   <audio>/<video> → サイレント時は無音になる
  //   WebAudio API    → iOS 13+ ではサイレントスイッチの影響なし ✅
  //   → MP3 ではなく WebAudio API を使う理由がここにある
  //
  // ■ 解決策
  //   A. resume() を async/await を一切介さず同期スタックで直接呼ぶ
  //   B. pendingAlarm フラグで「鳴らし忘れ」を追跡
  //   C. visibilitychange / touchstart で pendingAlarm を消化
  //   D. 音が出せなかった場合は表示を点滅させてフィードバック
  // =====================================================================

  var AC           = window.AudioContext || window.webkitAudioContext;
  var audioCtx     = null;   // シングルトン。一度作ったら破棄しない
  var audioReady   = false;  // 無音バッファ再生完了 = 完全アンロック済み
  var pendingAlarm = false;  // タイマー終了時に音が出せなかった場合 true

  // ------------------------------------------------------------------
  // 無音バッファ再生 → iOS の完全アンロック完了
  // audioCtx.state === 'running' のときだけ呼ぶこと
  // ------------------------------------------------------------------
  function playSilentBuffer() {
    if (!audioCtx || audioCtx.state !== 'running' || audioReady) return;
    var buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
    audioReady = true;
  }

  // ------------------------------------------------------------------
  // pendingAlarm があり今すぐ音を出せる状態なら再生
  // ------------------------------------------------------------------
  function checkPendingAlarm() {
    if (!pendingAlarm) return;
    if (!audioCtx || audioCtx.state !== 'running') return;
    pendingAlarm = false;
    display.classList.remove('pending-alarm');
    scheduleBeeps(audioCtx);
  }

  // ------------------------------------------------------------------
  // ★ iOS で最重要: resume() を async/await を一切介さず
  //    ユーザージェスチャーの【同期スタック内】で直接呼ぶ。
  //    toggle() / setPreset() / adjust() から直接呼ぶ。
  //    body touchstart / click リスナーからも呼ぶ。
  // ------------------------------------------------------------------
  function unlockAudioSync() {
    if (!AC) return;

    // 初回のみ生成（ジェスチャー前の生成自体は問題なし）
    if (!audioCtx) {
      audioCtx = new AC();
    }

    if (audioCtx.state === 'suspended') {
      // resume() を【同期で発行】→ iOS の gesture trust が有効な間に呼ぶ
      audioCtx.resume().then(function () {
        playSilentBuffer();
        checkPendingAlarm();
      }).catch(function () {});

    } else if (audioCtx.state === 'running') {
      playSilentBuffer();
      checkPendingAlarm();
    }
    // state === 'closed' は何もしない（再生成しない）
  }

  // ------------------------------------------------------------------
  // バックグラウンド復帰時: suspended に戻った ctx を resume する。
  // pendingAlarm があれば消化する。
  // ------------------------------------------------------------------
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState !== 'visible') return;
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().then(function () {
        playSilentBuffer();
        checkPendingAlarm();
      }).catch(function () {});
    } else if (audioCtx.state === 'running') {
      checkPendingAlarm();
    }
  });

  // body への touchstart / click でも unlock + pendingAlarm 消化
  // （スタートボタン以外を最初にタップしたケースもカバー）
  document.body.addEventListener('touchstart', function () {
    unlockAudioSync();
  }, { passive: true });
  document.body.addEventListener('click', function () {
    unlockAudioSync();
  }, { passive: true });

  // ----------------------------------------------------------------
  // ダブルタップズーム 追加保険 (iOS Safari / PWA)
  // CSS touch-action: manipulation だけでは古い iOS や特定の要素で
  // ズームが発生するケースがあるため、300ms 以内の連続タップを
  // preventDefault() で打ち消す。
  // ----------------------------------------------------------------
  var lastTap = 0;
  document.addEventListener('touchend', function (e) {
    var now = Date.now();
    if (now - lastTap < 300) {
      e.preventDefault(); // ダブルタップズームをキャンセル
    }
    lastTap = now;
  }, { passive: false });

  // ---- Service Worker --------------------------------------------------
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function (err) {
        console.warn('ServiceWorker registration failed:', err);
      });
    });
  }

  window.addEventListener('appinstalled', function () {
    console.log('PWA installed');
  });

  // ---- Web Worker (inline via Blob) ------------------------------------
  // バックグラウンドタブでも throttle されない独立スレッドで動作する。
  // Date.now() で実経過時間を測るためインターバルがズレても残り秒数は正確。
  var workerCode = [
    'var intervalId = null;',
    'var deadline = 0;',
    'self.onmessage = function(e) {',
    '  if (e.data.type === "start") {',
    '    clearInterval(intervalId);',
    '    deadline = Date.now() + e.data.seconds * 1000;',
    '    intervalId = setInterval(function() {',
    '      var msLeft = deadline - Date.now();',
    '      var remaining = Math.max(0, Math.ceil(msLeft / 1000));',
    '      self.postMessage({ type: "tick", remaining: remaining });',
    '      if (remaining <= 0) {',
    '        clearInterval(intervalId);',
    '        self.postMessage({ type: "done" });',
    '      }',
    '    }, 250);',
    '  } else if (e.data.type === "stop") {',
    '    clearInterval(intervalId);',
    '  }',
    '};'
  ].join('\n');

  var blob      = new Blob([workerCode], { type: 'application/javascript' });
  var workerUrl = URL.createObjectURL(blob);

  function createWorker() {
    if (worker) worker.terminate();
    worker = new Worker(workerUrl);
    worker.onmessage = function (e) {
      if (e.data.type === 'tick') {
        remaining = e.data.remaining;
        updateDisplay();
        updateRing();
        if (remaining <= 10) {
          display.classList.add('urgent');
          ring.classList.add('urgent');
        }
      } else if (e.data.type === 'done') {
        finish();
      }
    };
  }
  // ----------------------------------------------------------------------

  function setPreset(minutes, evt) {
    if (running) return;
    document.querySelectorAll('.preset-btn').forEach(function (b) { b.classList.remove('active'); });
    if (evt && evt.target) evt.target.classList.add('active');
    totalSeconds = minutes * 60;
    remaining    = totalSeconds;
    updateDisplay();
    resetRing();
    unlockAudioSync(); // タップ = ジェスチャー → アンロック
  }

  function adjust(seconds) {
    if (running) return;
    totalSeconds = Math.max(30, totalSeconds + seconds);
    remaining    = totalSeconds;
    document.querySelectorAll('.preset-btn').forEach(function (b) { b.classList.remove('active'); });
    updateDisplay();
    resetRing();
    unlockAudioSync();
  }

  // ★ toggle() は非 async のまま維持する。
  //    async にすると Promise が返り、onclick の同期スタックが分断される。
  function toggle() {
    if (running) {
      reset();
    } else {
      // ① まず同期スタック内で resume() を発行（iOS gesture trust が有効な間）
      unlockAudioSync();
      // ② その後タイマー起動（同期）
      start();
    }
  }

  // ★ start() も非 async。
  //    アンロックは呼び元 toggle() の unlockAudioSync() で完了済み。
  //    async にしていたことが前バージョンで動かなかった主因の一つ。
  function start() {
    running      = true;
    pendingAlarm = false;
    display.classList.remove('pending-alarm');
    startBtn.textContent = 'リセット';
    startBtn.classList.add('running');
    display.classList.remove('urgent', 'done');
    ring.classList.remove('urgent', 'done');
    updateDisplay();
    updateRing();
    createWorker();
    worker.postMessage({ type: 'start', seconds: remaining });
  }

  function reset() {
    if (worker) { worker.postMessage({ type: 'stop' }); worker.terminate(); worker = null; }
    running      = false;
    remaining    = totalSeconds;
    pendingAlarm = false;
    display.classList.remove('pending-alarm');
    updateDisplay();
    resetRing();
    display.classList.remove('urgent', 'done');
    ring.classList.remove('urgent', 'done');
    startBtn.textContent = 'スタート';
    startBtn.classList.remove('running');
  }

  function finish() {
    if (worker) { worker.terminate(); worker = null; }
    running = false;
    display.classList.remove('urgent');
    display.classList.add('done');
    ring.classList.remove('urgent');
    ring.classList.add('done');
    startBtn.textContent = 'スタート';
    startBtn.classList.remove('running');
    playAlarm();
  }

  // ------------------------------------------------------------------
  // playAlarm: ジェスチャー外（Worker done message）から呼ばれる。
  //
  // ctx が running → 即時再生。
  // ctx が suspended → pendingAlarm を立て、次のジェスチャー /
  //                    visibilitychange で消化する（表示を点滅）。
  // ------------------------------------------------------------------
  function playAlarm() {
    if (!audioCtx) {
      // スタートが押されていれば必ず存在するはず
      pendingAlarm = true;
      display.classList.remove('done');
      display.classList.add('pending-alarm');
      return;
    }

    if (audioCtx.state === 'running') {
      scheduleBeeps(audioCtx);
      return;
    }

    // suspended: pendingAlarm を立てる
    pendingAlarm = true;
    display.classList.add('pending-alarm');

    // resume() を試みる。画面復帰直後なら成功する場合がある
    audioCtx.resume().then(function () {
      playSilentBuffer();
      checkPendingAlarm();
    }).catch(function () {});
  }

  // ------------------------------------------------------------------
  // scheduleBeeps: ctx が running 状態を前提として呼ぶ。
  //
  // 音の構成:
  //   880 Hz (ラ) × 2回 → 注意を引く短いビープ
  //   1320 Hz (ミ) × 1回 → 高めの余韻で終了を知らせる
  //
  // WebAudio API なのでサイレントスイッチ (iOS 13+) の影響を受けない。
  // ------------------------------------------------------------------
  function scheduleBeeps(ctx) {
    var compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -3;
    compressor.knee.value = 0;
    compressor.ratio.value = 20;
    compressor.attack.value = 0;
    compressor.release.value = 0.05;
    compressor.connect(ctx.destination);

    var beeps = [
      { freq: 880,  start: 0,    dur: 0.12 },
      { freq: 880,  start: 0.18, dur: 0.12 },
      { freq: 1320, start: 0.36, dur: 0.60 },
    ];

    beeps.forEach(function (b) {
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(compressor);
      osc.type = 'square';
      osc.frequency.value = b.freq;
      var t = ctx.currentTime + b.start;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(1.0, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + b.dur);
      osc.start(t);
      osc.stop(t + b.dur + 0.05);
    });

    setTimeout(function () {
      display.classList.remove('done');
      ring.classList.remove('done');
    }, 2000);
  }

  function updateDisplay() {
    var m = Math.floor(remaining / 60);
    var s = remaining % 60;
    display.textContent = m + ':' + String(s).padStart(2, '0');
  }

  function updateRing() {
    var fraction = totalSeconds > 0 ? remaining / totalSeconds : 0;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
  }

  function resetRing() {
    ring.style.strokeDashoffset = 0;
  }

  updateDisplay();
  resetRing();
</script>
</body>
</html>
