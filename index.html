<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Timer">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.svg">
<title>タイマー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: #1a1a2e;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    padding: constant(safe-area-inset-top) constant(safe-area-inset-right) constant(safe-area-inset-bottom) constant(safe-area-inset-left);
    background-color: #1a1a2e;
  }

  .container {
    text-align: center;
    padding: 40px 32px;
    background: #16213e;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    width: 340px;
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #7c83fd;
    margin-bottom: 36px;
  }

  .display {
    font-size: 88px;
    font-weight: 200;
    letter-spacing: -2px;
    line-height: 1;
    color: #fff;
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }

  .display.urgent { color: #ff6b6b; }
  .display.done   { color: #6bffb8; }

  .progress-ring {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 32px;
  }

  .progress-ring svg {
    transform: rotate(-90deg);
    position: absolute;
    top: 0; left: 0;
  }

  .progress-ring .display {
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
  }

  circle.track {
    fill: none;
    stroke: #0f3460;
    stroke-width: 6;
  }

  circle.progress {
    fill: none;
    stroke: #7c83fd;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  circle.progress.urgent { stroke: #ff6b6b; }
  circle.progress.done   { stroke: #6bffb8; }

  .presets {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .preset-btn {
    background: #0f3460;
    border: 2px solid transparent;
    color: #aaa;
    border-radius: 12px;
    padding: 8px 0;
    width: 64px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover { background: #1a4a8a; color: #fff; }

  .preset-btn.active {
    border-color: #7c83fd;
    color: #7c83fd;
    background: #1a1a3e;
  }

  .adjusters {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .adj-btn {
    background: #0f3460;
    border: none;
    color: #aaa;
    border-radius: 10px;
    padding: 7px 0;
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .adj-btn:hover { background: #1a4a8a; color: #fff; }
  .adj-btn:active { transform: scale(0.95); }

  .start-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: #7c83fd;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .start-btn:hover  { background: #9da2ff; transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }
  .start-btn.running { background: #444; }
  .start-btn.running:hover { background: #555; }
</style>
</head>
<body>
<div class="container">
  <h1>Timer</h1>

  <div class="progress-ring">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle class="track"    cx="100" cy="100" r="88"/>
      <circle class="progress" cx="100" cy="100" r="88" id="ring"/>
    </svg>
    <div class="display" id="display">3:00</div>
  </div>

  <div class="presets">
    <button class="preset-btn" onclick="setPreset(1,event)">1分</button>
    <button class="preset-btn active" onclick="setPreset(3,event)">3分</button>
    <button class="preset-btn" onclick="setPreset(5,event)">5分</button>
    <button class="preset-btn" onclick="setPreset(10,event)">10分</button>
  </div>

  <div class="adjusters">
    <button class="adj-btn" onclick="adjust(-60)">−1分</button>
    <button class="adj-btn" onclick="adjust(-30)">−30秒</button>
    <button class="adj-btn" onclick="adjust(30)">+30秒</button>
    <button class="adj-btn" onclick="adjust(60)">+1分</button>
  </div>

  <button class="start-btn" id="startBtn" onclick="toggle()">スタート</button>
</div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 88;
  const ring    = document.getElementById('ring');
  const display = document.getElementById('display');
  const startBtn = document.getElementById('startBtn');
  ring.style.strokeDasharray = CIRCUMFERENCE;

  let totalSeconds = 180;
  let remaining    = 180;
  let running      = false;
  let worker       = null;

  // =====================================================================
  // iOS Safari / PWA 音声アンロック戦略
  // =====================================================================
  // iOS の制限：
  //   1. AudioContext は生成直後 state === 'suspended' で停止している
  //   2. ctx.resume() はユーザージェスチャー（touchstart / click）の
  //      同期コールスタック内でしか機能しない
  //   3. バックグラウンド復帰時に再び suspended になることがある
  //   4. 無音バッファを一度再生しないと古い iOS では完全にアンロックされない
  //   5. ハードウェアのサイレントスイッチ：
  //      - <audio> / <video> 要素 → サイレント時は無音
  //      - WebAudio API (AudioContext) → iOS 13+ ではサイレント無関係に鳴る ✅
  //      → MP3 ではなく WebAudio API を使う理由はここにある
  //
  // 解決策：
  //   ・スタートボタン押下（= ユーザージェスチャー内）で resume() + 無音再生
  //   ・作成した ctx を使い回し、アラーム時は ctx が running 状態を前提とする
  //   ・visibilitychange で復帰時にも resume() を試みる
  // =====================================================================

  const AC = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;          // シングルトン。一度作ったら使い回す
  let audioReady = false;       // 無音バッファ再生まで完了したか

  /**
   * ユーザージェスチャー内から呼ぶ。
   * AudioContext の生成・resume・無音バッファ再生 をすべて行う。
   */
  async function ensureAudioUnlocked() {
    if (!AC) return;

    // 初回のみ AudioContext を生成
    if (!audioCtx) {
      audioCtx = new AC();
    }

    // suspended なら resume（ジェスチャー内でないと iOS では効かない）
    if (audioCtx.state === 'suspended') {
      try {
        await audioCtx.resume();
      } catch (e) {
        console.warn('AudioContext resume failed:', e);
        return;
      }
    }

    // running になったら無音バッファで完全アンロック（iOS 旧バージョン対策）
    if (audioCtx.state === 'running' && !audioReady) {
      const silentBuf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
      const src = audioCtx.createBufferSource();
      src.buffer = silentBuf;
      src.connect(audioCtx.destination);
      src.start(0);
      audioReady = true;
    }
  }

  // バックグラウンド復帰時（PWA スリープ後など）に suspended に戻ることがある
  // → 再びアクティブになった瞬間に resume を試みる
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible' && audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(() => {});
    }
  });

  // PWA ホーム画面起動直後は初回タップ前まで suspended のまま。
  // bodyへの最初のタッチでも unlock を試みることで
  // ユーザーがスタートボタン以外を先にタップした場合もカバーする。
  document.body.addEventListener('touchstart', ensureAudioUnlocked, { passive: true });
  document.body.addEventListener('click',      ensureAudioUnlocked, { passive: true });

  // ---- Service Worker --------------------------------------------------
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./sw.js').catch(function (err) {
        console.warn('ServiceWorker registration failed:', err);
      });
    });
  }

  window.addEventListener('appinstalled', function () {
    console.log('PWA installed');
  });

  // ---- Web Worker (inline via Blob) ------------------------------------
  // バックグラウンドタブでも throttle されない独立スレッドで動作する。
  // Date.now() で実経過時間を測るため、インターバルがズレても
  // 表示される残り秒数は常に正確に保たれる。
  const workerCode = `
    let intervalId = null;
    let deadline = 0;

    self.onmessage = function(e) {
      if (e.data.type === 'start') {
        clearInterval(intervalId);
        deadline = Date.now() + e.data.seconds * 1000;

        intervalId = setInterval(function() {
          const msLeft = deadline - Date.now();
          const remaining = Math.max(0, Math.ceil(msLeft / 1000));
          self.postMessage({ type: 'tick', remaining: remaining });
          if (remaining <= 0) {
            clearInterval(intervalId);
            self.postMessage({ type: 'done' });
          }
        }, 250);  // 250ms ポーリングで 1 秒単位の切り替わりを確実に捉える

      } else if (e.data.type === 'stop') {
        clearInterval(intervalId);
      }
    };
  `;
  const blob      = new Blob([workerCode], { type: 'application/javascript' });
  const workerUrl = URL.createObjectURL(blob);

  function createWorker() {
    if (worker) worker.terminate();
    worker = new Worker(workerUrl);
    worker.onmessage = function (e) {
      if (e.data.type === 'tick') {
        remaining = e.data.remaining;
        updateDisplay();
        updateRing();
        if (remaining <= 10) {
          display.classList.add('urgent');
          ring.classList.add('urgent');
        }
      } else if (e.data.type === 'done') {
        finish();
      }
    };
  }
  // ----------------------------------------------------------------------

  function setPreset(minutes, evt) {
    if (running) return;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    if (evt && evt.target) evt.target.classList.add('active');
    totalSeconds = minutes * 60;
    remaining    = totalSeconds;
    updateDisplay();
    resetRing();
    // プリセットタップもジェスチャーなのでここでもアンロック
    ensureAudioUnlocked();
  }

  function adjust(seconds) {
    if (running) return;
    totalSeconds = Math.max(30, totalSeconds + seconds);
    remaining    = totalSeconds;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    updateDisplay();
    resetRing();
    ensureAudioUnlocked();
  }

  function toggle() {
    running ? reset() : start();
  }

  async function start() {
    // ★ iOS 最重要ポイント：
    //    ユーザージェスチャー（スタートボタン押下）の同期コールスタック内で
    //    resume() を呼ぶ。await の前に AudioContext 生成・resume を完了させる。
    await ensureAudioUnlocked();

    running = true;
    startBtn.textContent = 'リセット';
    startBtn.classList.add('running');
    display.classList.remove('urgent', 'done');
    ring.classList.remove('urgent', 'done');
    updateDisplay();
    updateRing();
    createWorker();
    worker.postMessage({ type: 'start', seconds: remaining });
  }

  function reset() {
    if (worker) { worker.postMessage({ type: 'stop' }); worker.terminate(); worker = null; }
    running   = false;
    remaining = totalSeconds;
    updateDisplay();
    resetRing();
    display.classList.remove('urgent', 'done');
    ring.classList.remove('urgent', 'done');
    startBtn.textContent = 'スタート';
    startBtn.classList.remove('running');
  }

  function finish() {
    if (worker) { worker.terminate(); worker = null; }
    running = false;
    display.classList.remove('urgent');
    display.classList.add('done');
    ring.classList.remove('urgent');
    ring.classList.add('done');
    startBtn.textContent = 'スタート';
    startBtn.classList.remove('running');
    playAlarm();
  }

  function updateDisplay() {
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    display.textContent = `${m}:${String(s).padStart(2, '0')}`;
  }

  function updateRing() {
    const fraction = totalSeconds > 0 ? remaining / totalSeconds : 0;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
  }

  function resetRing() {
    ring.style.strokeDashoffset = 0;
  }

  /**
   * WebAudio API でビープ音を生成して再生する。
   *
   * ★ この関数はタイマー終了時（= Workerのメッセージ受信 = ジェスチャー外）
   *    から呼ばれる。そのため ctx.resume() はここでは効かない。
   *    スタートボタン押下時に ensureAudioUnlocked() で完全に running に
   *    しておくことが前提。
   *
   * サイレントスイッチについて：
   *   WebAudio API は iOS 13+ でサイレントスイッチの影響を受けない。
   *   ただしユーザーが音量を 0 にしていれば当然無音になる（仕様）。
   */
  function playAlarm() {
    if (!audioCtx) {
      // スタートが押されていれば必ず存在するはず。念のため。
      console.warn('AudioContext が初期化されていません。スタートボタンを押してください。');
      return;
    }

    // バックグラウンド復帰直後などで suspended になっていれば
    // 再生を少し遅らせて resume を試みる（ジェスチャー外なので成功しない
    // こともあるが、試みるだけ試みる）
    if (audioCtx.state !== 'running') {
      audioCtx.resume().then(() => scheduleBeeps(audioCtx)).catch(() => {});
      return;
    }

    scheduleBeeps(audioCtx);
  }

  /**
   * 実際のビープ音スケジューリング。
   * ctx が running 状態であることを前提として呼ぶ。
   *
   * 音の構成：
   *   ・880 Hz (ラ)  × 2回 → 注意を引く短いビープ
   *   ・1320 Hz (ミ) × 1回 → 高めの余韻で終了を知らせる
   */
  function scheduleBeeps(ctx) {
    const beeps = [
      { freq: 880,  start: 0,    dur: 0.12 },
      { freq: 880,  start: 0.18, dur: 0.12 },
      { freq: 1320, start: 0.36, dur: 0.60 },
    ];

    beeps.forEach(({ freq, start, dur }) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.type = 'sine';
      osc.frequency.value = freq;

      const t = ctx.currentTime + start;
      // アタック：急峻なクリックノイズを避けるため 10ms でフェードイン
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.45, t + 0.01);
      // ディケイ：自然な余韻でフェードアウト
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);

      osc.start(t);
      osc.stop(t + dur + 0.05);
    });

    // 2 秒後に done スタイルをリセット
    setTimeout(() => {
      display.classList.remove('done');
      ring.classList.remove('done');
    }, 2000);
  }

  updateDisplay();
  resetRing();
</script>
</body>
</html>
